name: release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-${{ github.sha }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0
  CARGO_PROFILE_DEV_DEBUG: 0

jobs:
  build:
    name: Build (${{ matrix.runner }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 10
    defaults:
      run:
        shell: bash -euo pipefail {0}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-26
            target: aarch64-apple-darwin
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.runner }}-${{ matrix.target }}

      - name: Run tests
        run: make test-ci

      - name: Build release
        # release-pgo disabled for now
        run: make release

      - run: cp "target/${{ matrix.target }}/release/ish" "ish-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ish-${{ matrix.target }}
          path: ish-${{ matrix.target }}

  release:
    name: Create pre-release
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create pre-release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: release-${{ github.sha }}
        run: |
          gh release create "$RELEASE_TAG" dist/ish-* \
            --repo "$GITHUB_REPOSITORY" \
            --prerelease \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TAG"
